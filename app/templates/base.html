<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}
            Intern Flask REST API
        {% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body class="app-body">

    <div class="app-layout">

        <aside class="sidebar">

            <div class="brand">
                <div class="brand-logo">FA</div>

                <div>
                    <h1>Intern Flask REST API</h1>

                    <span>
                        PostgreSQL • JWT • SQLAlchemy
                    </span>
                </div>
            </div>

            <nav class="sidebar-nav">

                <a href="/dashboard">
                    Dashboard
                </a>

                <a href="/users">
                    Users
                </a>

                <a href="/users/create">
                    Create User
                </a>

                <a href="/online-users">
                    Online Users
                </a>

            </nav>

            <button
                type="button"
                class="logout-button"
                id="logoutButton"
            >
                Log Out
            </button>

        </aside>

        <main class="main-content">

            <header class="topbar">

                <div>
                    <p class="page-label">
                        Flask REST API
                    </p>

                    <h2>
                        {% block page_title %}
                            Dashboard
                        {% endblock %}
                    </h2>
                </div>

                <div class="status-badge">
                    <span class="status-dot"></span>
                    API Active
                </div>

            </header>

            <section class="content-area">

                <div
                    id="globalAlert"
                    class="alert d-none"
                    role="alert"
                ></div>

                {% block content %}
                {% endblock %}

            </section>

        </main>

    </div>

    <script
        src="{{ url_for('static', filename='js/auth.js') }}"
    ></script>

    {% block scripts %}
    {% endblock %}

</body>
</html>
