<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Create User | Intern Flask REST API</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body class="form-page-body">

    <main class="form-page-wrapper">

        <section class="form-card">

            <div class="form-card-header">

                <div>

                    <p class="eyebrow">
                        POST /user/create
                    </p>

                    <h1>Create New User</h1>

                    <p>
                        Fill in the required fields to create a new account.
                    </p>

                </div>

                <a
                    href="/login-page"
                    class="back-link"
                >
                    Back to Login
                </a>

            </div>

            <div class="required-info">
                Fields marked with
                <span class="required-mark">*</span>
                are required.
            </div>

            <div
                id="createUserAlert"
                class="alert d-none"
                role="alert"
            ></div>

            <form id="createUserForm">

                <div class="row g-3">

                    <div class="col-md-6">

                        <label
                            for="username"
                            class="form-label"
                        >
                            Username
                            <span class="required-mark">*</span>
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="username"
                            required
                        >

                    </div>

                    <div class="col-md-6">

                        <label
                            for="email"
                            class="form-label"
                        >
                            Email
                            <span class="required-mark">*</span>
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            required
                        >

                    </div>

                    <div class="col-md-4">

                        <label
                            for="firstname"
                            class="form-label"
                        >
                            First Name
                            <span class="required-mark">*</span>
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="firstname"
                            required
                        >

                    </div>

                    <div class="col-md-4">

                        <label
                            for="middlename"
                            class="form-label"
                        >
                            Middle Name

                            <span class="optional-text">
                                (optional)
                            </span>
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="middlename"
                        >

                    </div>

                    <div class="col-md-4">

                        <label
                            for="lastname"
                            class="form-label"
                        >
                            Last Name
                            <span class="required-mark">*</span>
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="lastname"
                            required
                        >

                    </div>

                    <div class="col-md-6">

                        <label
                            for="birthdate"
                            class="form-label"
                        >
                            Birth Date

                            <span class="optional-text">
                                (optional)
                            </span>
                        </label>

                        <input
                            type="date"
                            class="form-control"
                            id="birthdate"
                        >

                    </div>

                    <div class="col-md-6">

                        <label
                            for="password"
                            class="form-label"
                        >
                            Password
                            <span class="required-mark">*</span>
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            required
                        >

                        <small class="form-text">
                            Must contain at least 8 characters,
                            one uppercase letter, one lowercase letter,
                            and one number.
                        </small>

                    </div>

                </div>

                <div class="form-actions">

                    <button
                        type="submit"
                        class="btn gradient-button"
                        id="createUserButton"
                    >
                        Create User
                    </button>

                    <a
                        href="/login-page"
                        class="btn light-button"
                    >
                        Cancel
                    </a>

                </div>

            </form>

        </section>

    </main>

    <script
        src="{{ url_for('static', filename='js/create_user.js') }}"
    ></script>

</body>
</html>
